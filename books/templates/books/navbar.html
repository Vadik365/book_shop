<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="{% url 'books:book_list' %}">
            Book Store
        </a>

        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'books:book_list' %}">
                Books
            </a>

            <a class="nav-link" href="{% url 'books:book_create' %}">
                Add Book
            </a>
        </div>

    </div>
</nav>
{% if user.is_authenticated %}

<span class="navbar-text me-3">

    Hello, {{ user.username }}

</span>

<form action="{% url 'users:logout' %}" method="post" class="d-inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-link nav-link p-0 border-0 bg-transparent">
        Logout
    </button>
</form>

{% else %}

<a class="nav-link" href="{% url 'users:login' %}">

    Login

</a>

<a class="nav-link" href="{% url 'users:register' %}">

    Register

</a>

{% endif %}
