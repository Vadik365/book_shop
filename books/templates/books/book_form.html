{% extends "books/base.html" %}

{% block content %}

<h2>Book Form</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Save
    </button>

    <a href="{% url 'books:book_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
